<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>减肥记录后台</title>
  <link rel="stylesheet" href="./admin.css?v=20260526-2" />
</head>
<body>
  <div class="wrap">
    <aside class="side card">
      <h2>记录管理</h2>
      <button class="nav active" data-tab="list">记录列表</button>
      <button class="nav" data-tab="edit">编辑记录</button>
      <button class="nav" data-tab="settings">系统设置</button>
      <button class="nav" data-tab="export">数据导出</button>
    </aside>
    <main class="main card">
      <section id="tab-list" class="tab on">
        <h3>记录列表</h3>
        <div class="row">
          <input id="fromDate" type="date" />
          <input id="toDate" type="date" />
          <button id="btnFilter">查询</button>
          <button id="btnReset">重置</button>
        </div>
        <table>
          <thead><tr><th>日期</th><th>三餐图</th><th>打卡</th><th>最终体重</th><th>操作</th></tr></thead>
          <tbody id="listBody"></tbody>
        </table>
      </section>

      <section id="tab-edit" class="tab">
        <h3>编辑记录 <span id="editDateLabel"></span></h3>
        <div class="row">
          <input id="editDate" type="date" />
          <button id="btnLoadDate">加载</button>
        </div>
        <div class="grid3">
          <div class="panel">
            <h4>三餐记录</h4>
            <div id="editMeals"></div>
          </div>
          <div class="panel">
            <h4>行为打卡</h4>
            <label><input id="gDiet" type="checkbox" /> 控制饮食</label>
            <label><input id="gExercise" type="checkbox" /> 规律锻炼</label>
            <label><input id="gSleep" type="checkbox" /> 规律作息</label>
            <textarea id="dNote" placeholder="备注"></textarea>
          </div>
          <div class="panel">
            <h4>体重记录</h4>
            <div class="row"><input id="newWeight" type="number" step="0.1" placeholder="kg" /><button id="btnAddW">添加</button></div>
            <div id="weightList"></div>
          </div>
        </div>
        <div class="row"><button id="btnSaveEdit">保存</button></div>
      </section>

      <section id="tab-settings" class="tab">
        <h3>系统设置</h3>
        <label>开始记录日</label>
        <div class="row"><input id="startDate" type="date" /><button id="btnSaveStart">保存</button></div>
        <div class="mini" id="settingsHint"></div>
      </section>

      <section id="tab-export" class="tab">
        <h3>数据导出</h3>
        <div class="panel">
          <div class="row">
            <label>开始日期</label>
            <input id="expFrom" type="date" />
            <label>结束日期</label>
            <input id="expTo" type="date" />
          </div>
          <div class="row">
            <label>文件前缀</label>
            <input id="expPrefix" type="text" value="diet_records" />
          </div>
          <div class="row">
            <button id="btnExport">导出CSV</button>
          </div>
          <div class="mini" id="exportHint"></div>
        </div>
      </section>
    </main>
  </div>
  <script src="./js/common.js?v=20260526-3"></script>
  <script src="./admin.js?v=20260526-4"></script>
</body>
</html>
